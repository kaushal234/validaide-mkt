services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            db:
                condition: service_healthy
        environment:
            APP_ENV: prod
            APP_DEBUG: 0
            APP_SECRET: ${APP_SECRET:-change_me_in_production}
            DATABASE_URL: mysql://app:${MYSQL_PASSWORD:-app}@db:3306/validaide_mkt?serverVersion=8.4.0&charset=utf8mb4
        expose:
            - "9000"

    nginx:
        build:
            context: .
            dockerfile: nginx.Dockerfile
        depends_on:
            - app
        ports:
            - "80:80"

    db:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: validaide_mkt
            MYSQL_USER: app
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
            interval: 5s
            timeout: 5s
            retries: 10
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data:
